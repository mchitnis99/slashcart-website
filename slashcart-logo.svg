<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <rect width="320" height="100" fill="#0E0E0E"/>

  <!-- Cart body -->
  <rect x="20" y="22" width="52" height="36" rx="6" fill="none" stroke="#FAFAF8" stroke-width="2.5"/>

  <!-- Cart handle -->
  <path d="M72 28 Q82 28 82 38" fill="none" stroke="#FAFAF8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Cart wheels -->
  <circle cx="30" cy="66" r="5.5" fill="none" stroke="#FAFAF8" stroke-width="2.5"/>
  <circle cx="58" cy="66" r="5.5" fill="none" stroke="#FAFAF8" stroke-width="2.5"/>

  <!-- Lime slash through cart -->
  <line x1="62" y1="12" x2="28" y2="76" stroke="#C8F135" stroke-width="4.5" stroke-linecap="round"/>

  <!-- SLASH wordmark -->
  <text x="102" y="48" font-family="'Bebas Neue', 'Arial Black', sans-serif" font-size="36" font-weight="700" letter-spacing="2" fill="#FAFAF8">SLASH</text>

  <!-- CART wordmark -->
  <text x="102" y="80" font-family="'Bebas Neue', 'Arial Black', sans-serif" font-size="36" font-weight="700" letter-spacing="2" fill="#C8F135">CART</text>
</svg>
